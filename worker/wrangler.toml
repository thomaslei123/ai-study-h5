name = "ai-kefu-proxy"
main = "src/index.js"
compatibility_date = "2025-01-01"

# 密钥不写在这里！用 `wrangler secret put` 存到 Cloudflare（见 README.md）：
#   GLM_API_KEY        智谱 key（id.secret 原样）
#   DEEPSEEK_API_KEY   DeepSeek key
# 可选覆盖默认（一般不用动）：
[vars]
GLM_BASE_URL = "https://open.bigmodel.cn/api/paas/v4"
GLM_MODEL = "glm-4.6v"
DEEPSEEK_BASE_URL = "https://api.deepseek.com"
DEEPSEEK_MODEL = "deepseek-chat"
# Opentrons 公司 key 组织级只放开 Haiku（opus-4-8/sonnet-4-6 返回 rate_limit_error=额度0）。
CLAUDE_MODEL = "claude-haiku-4-5"
